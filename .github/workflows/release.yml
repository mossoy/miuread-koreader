name: Release full package

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: miuread-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Read and verify version
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          from pathlib import Path
          import re
          import sys

          config_path = Path("miuread.koplugin/miuread/config.lua")
          meta_path = Path("miuread.koplugin/_meta.lua")

          for path in (config_path, meta_path):
              if not path.is_file():
                  print(f"::error::缺少必要文件：{path}")
                  sys.exit(1)

          config_text = config_path.read_text(encoding="utf-8")
          meta_text = meta_path.read_text(encoding="utf-8")

          config_match = re.search(
              r'\bVERSION\s*=\s*["\']([0-9]+\.[0-9]+\.[0-9]+)["\']',
              config_text,
          )
          meta_match = re.search(
              r'\bversion\s*=\s*["\']([0-9]+\.[0-9]+\.[0-9]+)["\']',
              meta_text,
          )

          if not config_match:
              print("::error::无法从 config.lua 读取版本号")
              sys.exit(1)
          if not meta_match:
              print("::error::无法从 _meta.lua 读取版本号")
              sys.exit(1)

          config_version = config_match.group(1)
          meta_version = meta_match.group(1)

          if config_version != meta_version:
              print(
                  "::error::版本号不一致："
                  f"config.lua={config_version}, "
                  f"_meta.lua={meta_version}"
              )
              sys.exit(1)

          env_path = Path("release.env")
          env_path.write_text(
              f"VERSION={config_version}\n"
              f"RELEASE_TAG=v{config_version}\n"
              f"PACKAGE_NAME=miuread-v{config_version}-full.zip\n",
              encoding="utf-8",
          )

          print(f"准备发布：v{config_version}")
          PY

          cat release.env >> "$GITHUB_ENV"

      - name: Build package and manifest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          python3 - <<'PY'
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile, ZipInfo
          import hashlib
          import json
          import os
          import sys

          version = os.environ["VERSION"]
          package_name = os.environ["PACKAGE_NAME"]
          repo = os.environ["GITHUB_REPOSITORY"]

          root = Path("miuread.koplugin")
          output = Path("dist") / package_name
          fixed_time = (2020, 1, 1, 0, 0, 0)

          if not root.is_dir():
              print(f"::error::缺少插件目录：{root}")
              sys.exit(1)

          excluded_names = {
              ".DS_Store",
              "miuread.lua",
              "settings.reader.lua",
          }
          excluded_suffixes = {
              ".md",
              ".epub",
              ".log",
          }

          def excluded(path):
              return (
                  "__MACOSX" in path.parts
                  or path.name in excluded_names
                  or path.suffix.lower() in excluded_suffixes
              )

          with ZipFile(
              output,
              "w",
              compression=ZIP_DEFLATED,
              compresslevel=9,
          ) as archive:
              directories = [root] + sorted(
                  [p for p in root.rglob("*") if p.is_dir()],
                  key=lambda p: p.as_posix(),
              )

              for path in directories:
                  info = ZipInfo(
                      path.as_posix().rstrip("/") + "/",
                      fixed_time,
                  )
                  info.create_system = 3
                  info.external_attr = (0o40755 << 16) | 0x10
                  archive.writestr(info, b"")

              files = sorted(
                  [
                      p
                      for p in root.rglob("*")
                      if p.is_file() and not excluded(p)
                  ],
                  key=lambda p: p.as_posix(),
              )

              for path in files:
                  info = ZipInfo(path.as_posix(), fixed_time)
                  info.create_system = 3
                  info.external_attr = 0o100644 << 16
                  info.compress_type = ZIP_DEFLATED
                  archive.writestr(info, path.read_bytes())

          payload = output.read_bytes()
          official = (
              f"https://github.com/{repo}/releases/download/"
              f"v{version}/{package_name}"
          )

          manifest = {
              "version": version,
              "name": f"觅阅 · 微信读书助手 {version}",
              "package_type": "full",
              "package_url": official,
              "package_urls": [
                  official,
                  f"https://ghfast.top/{official}",
                  f"https://gh-proxy.com/{official}",
                  f"https://ghproxy.net/{official}",
              ],
              "size": len(payload),
              "sha256": hashlib.sha256(payload).hexdigest(),
              "notes": (
                  "Release 仅发布完整安装包；"
                  "更新清单保存在仓库根目录。"
              ),
          }

          Path("dist/update.json").write_text(
              json.dumps(
                  manifest,
                  ensure_ascii=False,
                  indent=2,
              ) + "\n",
              encoding="utf-8",
          )

          print(f"完整包：{output}")
          print(f"大小：{len(payload)}")
          print(f"SHA-256：{manifest['sha256']}")
          PY

      - name: Verify local package
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile
          import os
          import sys

          package = Path("dist") / os.environ["PACKAGE_NAME"]
          required = {
              "miuread.koplugin/_meta.lua",
              "miuread.koplugin/main.lua",
              "miuread.koplugin/miuread/config.lua",
          }
          forbidden_names = {
              ".DS_Store",
              "miuread.lua",
              "settings.reader.lua",
          }
          forbidden_suffixes = {
              ".md",
              ".epub",
              ".log",
          }

          if not package.is_file():
              print(f"::error::完整包不存在：{package}")
              sys.exit(1)

          with ZipFile(package) as archive:
              names = archive.namelist()
              damaged = archive.testzip()

          errors = []
          if damaged:
              errors.append(f"ZIP 损坏：{damaged}")

          for name in sorted(required.difference(names)):
              errors.append(f"缺少必要文件：{name}")

          for name in names:
              path = Path(name)
              if not name.startswith("miuread.koplugin/"):
                  errors.append(f"根目录错误：{name}")
              if (
                  path.name in forbidden_names
                  or path.suffix.lower() in forbidden_suffixes
                  or "__MACOSX" in path.parts
              ):
                  errors.append(f"不应进入安装包：{name}")

          if errors:
              for error in errors:
                  print(f"::error::{error}")
              sys.exit(1)

          print(f"本地安装包检查通过，共 {len(names)} 个条目")
          PY

      - name: Publish only full package
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          FILE="dist/$PACKAGE_NAME"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
              while IFS= read -r asset; do
                  [ -n "$asset" ] || continue
                  echo "删除旧 Asset：$asset"
                  gh release delete-asset \
                    "$RELEASE_TAG" \
                    "$asset" \
                    --yes
              done < <(
                  gh release view "$RELEASE_TAG" \
                    --json assets \
                    --jq '.assets[].name'
              )

              gh release upload "$RELEASE_TAG" "$FILE"
          else
              gh release create \
                "$RELEASE_TAG" \
                "$FILE" \
                --target main \
                --title "觅阅 MiuRead v$VERSION" \
                --notes "全量更新包"
          fi

          count="$(
              gh release view "$RELEASE_TAG" \
                --json assets \
                --jq '.assets | length'
          )"
          name="$(
              gh release view "$RELEASE_TAG" \
                --json assets \
                --jq '.assets[0].name'
          )"

          if [ "$count" != "1" ] || [ "$name" != "$PACKAGE_NAME" ]; then
              echo "::error::Release Assets 不正确"
              gh release view "$RELEASE_TAG" \
                --json assets \
                --jq '.assets[].name'
              exit 1
          fi

          echo "Release 中只保留：$PACKAGE_NAME"

      - name: Verify public download URL
        shell: bash
        run: |
          set -euo pipefail

          URL="https://github.com/$GITHUB_REPOSITORY/releases/download/$RELEASE_TAG/$PACKAGE_NAME"
          EXPECTED="$(
              python3 -c \
              'import json; print(json.load(open("dist/update.json"))["sha256"])'
          )"

          rm -f dist/public-download.zip
          success=0

          for attempt in $(seq 1 12); do
              echo "验证公开下载地址，第 ${attempt}/12 次"

              if curl \
                  --fail \
                  --location \
                  --silent \
                  --show-error \
                  --connect-timeout 20 \
                  --max-time 180 \
                  --output dist/public-download.zip \
                  "$URL"
              then
                  ACTUAL="$(
                      sha256sum dist/public-download.zip \
                      | awk '{print $1}'
                  )"

                  if [ "$ACTUAL" = "$EXPECTED" ]; then
                      success=1
                      break
                  fi

                  echo "下载文件校验不符，等待后重试"
              fi

              rm -f dist/public-download.zip
              sleep 5
          done

          if [ "$success" != "1" ]; then
              echo "::error::公开下载地址尚不可用或文件校验失败。"
              echo "::error::为保护旧用户，本次不会更新仓库 update.json。"
              exit 1
          fi

          echo "公开下载地址验证通过：$URL"

      - name: Publish repository update.json
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          CONTENT="$(base64 -w 0 dist/update.json)"
          API_PATH="repos/$GITHUB_REPOSITORY/contents/update.json"
          CURRENT_SHA="$(
              gh api "$API_PATH?ref=main" \
                --jq '.sha' \
                2>/dev/null \
              || true
          )"

          if [ -n "$CURRENT_SHA" ]; then
              gh api \
                --method PUT \
                "$API_PATH" \
                -f message="Update manifest to $RELEASE_TAG" \
                -f content="$CONTENT" \
                -f branch="main" \
                -f sha="$CURRENT_SHA" \
                >/dev/null
          else
              gh api \
                --method PUT \
                "$API_PATH" \
                -f message="Add manifest for $RELEASE_TAG" \
                -f content="$CONTENT" \
                -f branch="main" \
                >/dev/null
          fi

          echo "仓库根目录 update.json 已更新到 $VERSION"
